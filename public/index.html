<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 面试教练 · 语音通话</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f7; min-height: 100vh; color: #1a1a1a; }
textarea { border: 1px solid #d0d5dd; border-radius: 8px; padding: 10px 12px; font-size: 13px; outline: none; background: #fff; width: 100%; resize: vertical; }
textarea:focus { border-color: #1D9E75; }
button { cursor: pointer; font-family: inherit; }

/* ===== 通话界面 ===== */
.call-wrap {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(160deg, #0a1628 0%, #0d2b1f 50%, #0a1628 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 60px 20px 50px;
}

/* 顶部：通话时长 */
.call-timer { color: rgba(255,255,255,0.4); font-size: 15px; letter-spacing: 2px; }

/* 中间：头像区 */
.call-center { display: flex; flex-direction: column; align-items: center; gap: 20px; }

.avatar-area { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
.ripple {
  position: absolute; border-radius: 50%;
  border: 1.5px solid rgba(29,158,117,0.5);
  animation: ripple 2.4s ease-out infinite;
}
.ripple:nth-child(1) { animation-delay: 0s; }
.ripple:nth-child(2) { animation-delay: 0.8s; }
.ripple:nth-child(3) { animation-delay: 1.6s; }
@keyframes ripple {
  0%   { width: 120px; height: 120px; opacity: 0.7; }
  100% { width: 260px; height: 260px; opacity: 0; }
}
.avatar-circle {
  width: 110px; height: 110px; border-radius: 50%; z-index: 1;
  background: linear-gradient(135deg, #1D9E75, #0a5c42);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
  box-shadow: 0 0 0 3px rgba(29,158,117,0.4);
  transition: box-shadow 0.3s;
}
.avatar-circle.talking {
  box-shadow: 0 0 0 8px rgba(29,158,117,0.5), 0 0 30px rgba(29,158,117,0.3);
  animation: avatarPulse 0.5s ease-in-out infinite alternate;
}
@keyframes avatarPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.04); }
}

.caller-name { color: #fff; font-size: 24px; font-weight: 600; }
.call-role   { color: rgba(255,255,255,0.45); font-size: 13px; margin-top: -12px; }

/* 字幕区 */
.subtitle-area {
  width: 100%; max-width: 360px;
  min-height: 80px; display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.subtitle-bubble {
  background: rgba(255,255,255,0.08);
  border-radius: 16px; padding: 12px 18px;
  font-size: 14px; line-height: 1.7; text-align: center;
  max-width: 340px; width: 100%;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.subtitle-bubble.interviewer { color: rgba(255,255,255,0.9); }
.subtitle-bubble.user        { color: rgba(29,158,117,0.9); background: rgba(29,158,117,0.1); }

/* 状态栏 */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,0.5); font-size: 13px;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); }
.status-dot.green { background: #1D9E75; animation: blink 1s ease-in-out infinite; }
.status-dot.yellow { background: #f5a623; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* 挂断（隐藏，仅面试结束时显示） */
.end-hint { color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useRef, useEffect, useCallback } = React;
const T = "#1D9E75", TL = "rgba(29,158,117,0.1)", TD = "#0F6E56";

// ===== API =====
const callAPI = async (system, messages) => {
  const body = { model: "claude-opus-4-7", max_tokens: 2000, messages };
  if (system) body.system = system;
  const res = await fetch("/api/chat", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`API 错误: ${res.status}`);
  const data = await res.json();
  return (data.content || []).map(b => b.text || "").join("");
};

const fileToBase64 = f => new Promise((ok, err) => {
  const r = new FileReader(); r.onload = () => ok(r.result.split(",")[1]);
  r.onerror = err; r.readAsDataURL(f);
});
const fileBlock = async f => {
  const d = await fileToBase64(f);
  return f.type === "application/pdf"
    ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:d } }
    : { type:"image",    source:{ type:"base64", media_type:f.type, data:d } };
};

// ===== TTS =====
const tts = (text, onEnd) => {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN"; u.rate = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang && v.lang.startsWith("zh"));
  if (zh) u.voice = zh;
  u.onend = onEnd || null;
  window.speechSynthesis.speak(u);
};

// ===== PROMPTS =====
const PARSE_SYS = `你是资深HR，分析简历和JD后严格输出JSON（不含Markdown、不含其他文字）：
{"candidate":{"name":"","target_role":"","education":"","experiences":[""],"skills":[""]},"jd":{"role":"","company":"","hard_requirements":[""],"core_duties":[""]},"match":{"score":0,"strengths":[""],"risks":[""]},"questions":[{"type":"行为类/能力类/压力类","question":""}]}
questions生成8道，基于候选人真实经历和JD要求定制，不要通用题。`;

const iTSys = p => `你是${p.jd?.company||"面试公司"}面试官，正在电话面试${p.candidate?.name||"候选人"}，应聘${p.jd?.role||"该岗位"}。
候选人：${p.candidate?.education}；${(p.candidate?.experiences||[]).join("；")}；技能：${(p.candidate?.skills||[]).join("、")}
题库：${(p.questions||[]).map((q,i)=>`${i+1}.[${q.type}]${q.question}`).join(" | ")}
规则：①每次只问一题，语言口语化简洁，像真实电话 ②回答过短时追问一次 ③不评价不暗示 ④按顺序问完所有题后说"好的，感谢您参加今天的面试，我们会尽快联系您，再见。"并在末尾加上[INTERVIEW_END]`;

const rptSys = (p, qa) => `你是专业面试辅导专家，复盘面试，严格输出JSON（不含Markdown）：
候选人：${p.candidate?.name}，应聘${p.jd?.role}@${p.jd?.company||""}
背景：${(p.candidate?.experiences||[]).join("；")}；技能：${(p.candidate?.skills||[]).join("、")}
记录：${qa.map((x,i)=>`Q${i+1}:${x.q}|A${i+1}:${x.a}`).join("||")}
格式：{"items":[{"question":"","summary":"","star":{"s":0,"t":0,"a":0,"r":0},"score":0,"issues":[""],"reference":"200-300字第一人称STAR结构含数据可直接背诵","tip":""}],"overall":{"avg":0,"best":0,"worst":0,"suggestions":[""]}}`;

// ===== STEP BAR =====
function StepBar({ cur }) {
  const steps = ["填写信息", "语音面试", "复盘报告"];
  return React.createElement("div", { style:{ display:"flex", alignItems:"center", marginBottom:"1.5rem" } },
    steps.map((s,i) => React.createElement("div", { key:i, style:{ display:"flex", alignItems:"center", flex: i<2?1:"none" } },
      React.createElement("div", { style:{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 } },
        React.createElement("div", { style:{ width:30, height:30, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background: i<=cur?T:"#e9ecef", color: i<=cur?"#fff":"#868e96", fontSize:13, fontWeight:500 } }, i<cur?"✓":i+1),
        React.createElement("span", { style:{ fontSize:11, color: i===cur?TD:"#868e96", fontWeight: i===cur?500:400, whiteSpace:"nowrap" } }, s)
      ),
      i<2 && React.createElement("div", { style:{ flex:1, height:2, background: i<cur?T:"#dee2e6", margin:"0 6px", marginBottom:16 } })
    ))
  );
}

function FileUpload({ accept, label, file, onFile }) {
  const ref = useRef();
  return React.createElement("div", {
    onClick: () => ref.current.click(),
    style:{ border:`1.5px dashed ${file?T:"#ced4da"}`, borderRadius:8, padding:"1.25rem", cursor:"pointer", textAlign:"center", background: file?TL:"#f8f9fa" }
  },
    React.createElement("input", { ref, type:"file", accept, style:{display:"none"}, onChange: e=>onFile(e.target.files[0]) }),
    React.createElement("div", { style:{fontSize:24, marginBottom:4} }, file?"✓":"📎"),
    React.createElement("div", { style:{fontSize:12, color: file?TD:"#868e96"} }, file?file.name:label)
  );
}

// ===== CALL SCREEN =====
function CallScreen({ parsed, firstMsg, onEnd }) {
  const [seconds, setSeconds]       = useState(0);
  const [phase, setPhase]           = useState("interviewer_talking"); // interviewer_talking | listening | processing
  const [interviewerText, setInterviewerText] = useState(firstMsg);
  const [userText, setUserText]     = useState("");
  const [transcript, setTranscript] = useState("");

  const msgsRef        = useRef([{ role:"assistant", content:firstMsg }]);
  const recogRef       = useRef(null);
  const silenceRef     = useRef(null);
  const finalTextRef   = useRef("");
  const listeningRef   = useRef(false);

  // 计时器
  useEffect(() => {
    const t = setInterval(() => setSeconds(s => s+1), 1000);
    return () => clearInterval(t);
  }, []);
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  // 停止语音识别
  const stopSTT = useCallback(() => {
    listeningRef.current = false;
    clearTimeout(silenceRef.current);
    if (recogRef.current) { try { recogRef.current.abort(); } catch(e){} recogRef.current = null; }
  }, []);

  // 发送用户回答 → 获取 AI 回复 → 播放
  const sendAnswer = useCallback(async (text) => {
    stopSTT();
    setUserText(text);
    setTranscript("");
    setPhase("processing");
    setInterviewerText("");

    const userMsg = { role:"user", content:text };
    const next = [...msgsRef.current, userMsg];
    msgsRef.current = next;

    try {
      const apiMsgs = [{ role:"user", content:"请开始面试。" }, ...next.map(m=>({ role:m.role, content:m.content }))];
      const ai = await callAPI(iTSys(parsed), apiMsgs);
      const hasEnd = ai.includes("[INTERVIEW_END]");
      const clean = ai.replace("[INTERVIEW_END]","").trim();

      msgsRef.current = [...next, { role:"assistant", content:clean }];
      setUserText("");
      setInterviewerText(clean);
      setPhase("interviewer_talking");

      tts(clean, () => {
        if (hasEnd) { onEnd(msgsRef.current); }
        else { startSTT(); }
      });
    } catch(e) {
      setPhase("listening");
      startSTT();
    }
  }, [parsed, stopSTT, onEnd]);

  // 开始语音识别
  const startSTT = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("请使用 Chrome 浏览器以支持语音识别"); return; }
    if (listeningRef.current) return;

    listeningRef.current = true;
    setPhase("listening");
    setInterviewerText("");
    finalTextRef.current = "";
    setTranscript("");

    const recog = new SR();
    recog.lang = "zh-CN";
    recog.continuous = true;
    recog.interimResults = true;
    recogRef.current = recog;

    recog.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTextRef.current += e.results[i][0].transcript;
        else interim = e.results[i][0].transcript;
      }
      setTranscript(finalTextRef.current + interim);
      // 停顿 2 秒自动提交
      if (finalTextRef.current) {
        clearTimeout(silenceRef.current);
        silenceRef.current = setTimeout(() => {
          if (finalTextRef.current.trim()) sendAnswer(finalTextRef.current.trim());
        }, 2000);
      }
    };

    recog.onerror = (e) => {
      if (e.error === "no-speech") { try { recog.start(); } catch(_){} }
    };

    recog.onend = () => {
      if (listeningRef.current) { try { recog.start(); } catch(_){} }
    };

    recog.start();
  }, [sendAnswer]);

  // 首次播放第一个问题
  useEffect(() => {
    setPhase("interviewer_talking");
    tts(firstMsg, () => { startSTT(); });
    return () => { window.speechSynthesis.cancel(); stopSTT(); };
  }, []);

  const interviewing = parsed?.jd?.company ? `${parsed.jd.company} 面试官` : "AI 面试官";
  const isTalking = phase === "interviewer_talking";
  const isListening = phase === "listening";

  return React.createElement("div", { className:"call-wrap" },

    // 顶部计时
    React.createElement("div", { className:"call-timer" }, fmt(seconds)),

    // 中间主体
    React.createElement("div", { className:"call-center" },

      // 头像
      React.createElement("div", { className:"avatar-area" },
        React.createElement("div", { className:"ripple" }),
        React.createElement("div", { className:"ripple" }),
        React.createElement("div", { className:"ripple" }),
        React.createElement("div", { className:`avatar-circle ${isTalking?"talking":""}` }, "👔")
      ),

      React.createElement("div", { className:"caller-name" }, interviewing),
      React.createElement("div", { className:"call-role" }, parsed?.jd?.role || "面试官"),

      // 字幕
      React.createElement("div", { className:"subtitle-area" },
        isTalking && interviewerText && React.createElement("div", { className:"subtitle-bubble interviewer", key:interviewerText.slice(0,10) }, interviewerText),
        (isListening || phase==="processing") && React.createElement("div", { className:`subtitle-bubble user` },
          transcript || (phase==="processing" ? "正在理解您的回答..." : "请说话...")
        )
      )
    ),

    // 底部状态
    React.createElement("div", { style:{ display:"flex", flexDirection:"column", alignItems:"center", gap:12 } },
      React.createElement("div", { className:"status-bar" },
        React.createElement("div", { className:`status-dot ${isListening?"green":isTalking?"yellow":""}` }),
        React.createElement("span", null,
          isTalking ? "面试官说话中" : isListening ? "请直接说话，停顿 2 秒自动发送" : "处理中..."
        )
      ),
      React.createElement("div", { className:"end-hint" }, "面试结束后将自动跳转复盘报告")
    )
  );
}

// ===== STAR BAR =====
function StarBar({ k, score }) {
  const labels = { s:"Situation 背景", t:"Task 任务", a:"Action 行动", r:"Result 结果" };
  const colors = { s:"#185FA5", t:T, a:"#BA7517", r:"#A32D2D" };
  const pct = Math.min(100, Math.round(((score||0)/25)*100));
  return React.createElement("div", { style:{ marginBottom:7 } },
    React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 } },
      React.createElement("span", { style:{ color:"#868e96" } }, labels[k]),
      React.createElement("span", { style:{ fontWeight:500 } }, `${score||0}/25`)
    ),
    React.createElement("div", { style:{ height:5, borderRadius:3, background:"#e9ecef" } },
      React.createElement("div", { style:{ height:"100%", borderRadius:3, width:`${pct}%`, background:colors[k], transition:"width 0.6s" } })
    )
  );
}

// ===== MAIN APP =====
function App() {
  const [step, setStep]     = useState(0);
  const [rMode, setRMode]   = useState("text");
  const [jMode, setJMode]   = useState("text");
  const [rText, setRText]   = useState("");
  const [jText, setJText]   = useState("");
  const [rFile, setRFile]   = useState(null);
  const [jFile, setJFile]   = useState(null);
  const [parsed, setParsed] = useState(null);
  const [firstMsg, setFirstMsg] = useState("");
  const [loading, setLoading] = useState(false);
  const [hint, setHint]     = useState("");
  const [report, setReport] = useState(null);
  const [exp, setExp]       = useState({});

  const handleStart = async () => {
    if (!rText && !rFile) { alert("请输入或上传简历"); return; }
    if (!jText && !jFile) { alert("请输入或上传JD"); return; }
    setLoading(true); setHint("AI 正在解析简历和岗位信息...");
    try {
      const content = [];
      if (rFile) { content.push(await fileBlock(rFile)); content.push({ type:"text", text:"以上是候选人简历。" }); }
      else content.push({ type:"text", text:`简历：\n${rText}` });
      if (jFile) { content.push(await fileBlock(jFile)); content.push({ type:"text", text:"以上是岗位JD，请完成解析。" }); }
      else content.push({ type:"text", text:`JD：\n${jText}\n\n请完成解析。` });

      const raw = await callAPI(PARSE_SYS, [{ role:"user", content }]);
      const p = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setParsed(p);

      setHint("面试官正在准备第一个问题...");
      const opening = await callAPI(iTSys(p), [{ role:"user", content:"请开始面试。" }]);
      setFirstMsg(opening.replace("[INTERVIEW_END]","").trim());
      setStep(1);
    } catch(e) {
      alert("解析失败：" + e.message);
    } finally { setLoading(false); setHint(""); }
  };

  const handleCallEnd = async (finalMsgs) => {
    setStep(2);
    setLoading(true); setHint("AI 正在生成复盘报告...");
    const qa = [];
    for (let i = 0; i < finalMsgs.length-1; i++) {
      if (finalMsgs[i].role==="assistant" && finalMsgs[i+1]?.role==="user")
        qa.push({ q:finalMsgs[i].content, a:finalMsgs[i+1].content });
    }
    try {
      const raw = await callAPI(null, [{ role:"user", content:rptSys(parsed, qa) }]);
      setReport(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { alert("报告生成失败：" + e.message); }
    finally { setLoading(false); setHint(""); }
  };

  const restart = () => {
    setStep(0); setParsed(null); setFirstMsg(""); setReport(null);
    setExp({}); setRText(""); setJText(""); setRFile(null); setJFile(null);
    window.speechSynthesis.cancel();
  };

  const tabBtn = active => ({
    padding:"5px 14px", borderRadius:6, fontSize:12, cursor:"pointer",
    background: active?T:"transparent", color: active?"#fff":"#868e96",
    border:`1px solid ${active?T:"#ced4da"}`, fontWeight: active?500:400,
  });
  const card = { background:"#fff", border:"0.5px solid #e9ecef", borderRadius:12, padding:"1.25rem" };

  return React.createElement("div", { style:{ minHeight:"100vh", background:"#f5f6f7", padding:"1.5rem 1rem" } },

    // 通话全屏界面
    step === 1 && parsed && firstMsg && React.createElement(CallScreen, { parsed, firstMsg, onEnd: handleCallEnd }),

    React.createElement("div", { style:{ maxWidth:720, margin:"0 auto" } },

      // Header
      React.createElement("div", { style:{ textAlign:"center", marginBottom:"1.5rem" } },
        React.createElement("h1", { style:{ fontSize:22, fontWeight:700 } }, "🎙️ AI 面试教练"),
        React.createElement("p", { style:{ fontSize:13, color:"#868e96", marginTop:4 } }, "语音通话模拟面试 · 逐题复盘报告")
      ),

      step !== 1 && React.createElement(StepBar, { cur: step===2&&report?2:step }),

      // STEP 0 - 填写信息
      step === 0 && React.createElement("div", { style:{ display:"flex", flexDirection:"column", gap:"1rem" } },

        React.createElement("div", { style:card },
          React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" } },
            React.createElement("span", { style:{ fontSize:14, fontWeight:600 } }, "📄 简历"),
            React.createElement("div", { style:{ display:"flex", gap:6 } },
              React.createElement("button", { style:tabBtn(rMode==="text"), onClick:()=>setRMode("text") }, "文字粘贴"),
              React.createElement("button", { style:tabBtn(rMode==="file"), onClick:()=>setRMode("file") }, "图片/PDF")
            )
          ),
          rMode==="text"
            ? React.createElement("textarea", { rows:7, placeholder:"粘贴简历内容...", value:rText, onChange:e=>setRText(e.target.value) })
            : React.createElement(FileUpload, { accept:".pdf,image/*", label:"点击上传简历（PDF 或图片）", file:rFile, onFile:setRFile })
        ),

        React.createElement("div", { style:card },
          React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" } },
            React.createElement("span", { style:{ fontSize:14, fontWeight:600 } }, "💼 岗位 JD"),
            React.createElement("div", { style:{ display:"flex", gap:6 } },
              React.createElement("button", { style:tabBtn(jMode==="text"), onClick:()=>setJMode("text") }, "文字粘贴"),
              React.createElement("button", { style:tabBtn(jMode==="file"), onClick:()=>setJMode("file") }, "拍照/图片")
            )
          ),
          jMode==="text"
            ? React.createElement("textarea", { rows:6, placeholder:"粘贴岗位JD内容...", value:jText, onChange:e=>setJText(e.target.value) })
            : React.createElement(FileUpload, { accept:"image/*", label:"点击上传JD截图", file:jFile, onFile:setJFile })
        ),

        React.createElement("div", { style:{ background:TL, border:`0.5px solid ${T}40`, borderRadius:8, padding:"0.75rem 1rem", fontSize:12, color:TD } },
          "📞 开始后进入全屏通话界面，面试官自动语音提问，你直接开口回答，停顿 2 秒自动识别发送，全程无需点击任何按钮。请使用 Chrome 浏览器。"
        ),

        loading
          ? React.createElement("div", { style:{ textAlign:"center", padding:"1.5rem", color:"#868e96", fontSize:14 } }, hint)
          : React.createElement("button", {
              onClick: handleStart,
              style:{ width:"100%", padding:"0.9rem", background:T, color:"#fff", border:"none", borderRadius:10, fontSize:16, fontWeight:600, letterSpacing:1 }
            }, "📞  开始语音面试")
      ),

      // STEP 2 - 复盘报告
      step === 2 && React.createElement("div", null,
        loading && React.createElement("div", { style:{ textAlign:"center", padding:"4rem 1rem", color:"#868e96" } },
          React.createElement("div", { style:{ fontSize:36, marginBottom:"1rem" } }, "⏳"),
          React.createElement("p", null, hint)
        ),

        report && React.createElement("div", null,
          // 总分卡
          React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"0.75rem", marginBottom:"1rem" } },
            [["综合得分", `${Math.round(report.overall?.avg||0)}`, T],
             ["最强题目", `第 ${(report.overall?.best||0)+1} 题`, "#185FA5"],
             ["需要加强", `第 ${(report.overall?.worst||0)+1} 题`, "#A32D2D"]
            ].map(([l,v,c]) => React.createElement("div", { key:l, style:{ background:"#fff", border:"0.5px solid #e9ecef", borderRadius:8, padding:"0.75rem", textAlign:"center" } },
              React.createElement("div", { style:{ fontSize:11, color:"#868e96", marginBottom:4 } }, l),
              React.createElement("div", { style:{ fontSize:22, fontWeight:600, color:c } }, v)
            ))
          ),

          // 核心建议
          React.createElement("div", { style:{ background:TL, border:`0.5px solid ${T}40`, borderRadius:8, padding:"0.75rem 1rem", marginBottom:"1rem" } },
            React.createElement("div", { style:{ fontSize:12, fontWeight:600, color:TD, marginBottom:6 } }, "核心建议"),
            (report.overall?.suggestions||[]).map((s,i) => React.createElement("div", { key:i, style:{ fontSize:13, marginBottom:4 } }, `· ${s}`))
          ),

          // 逐题复盘
          (report.items||[]).map((item, i) =>
            React.createElement("div", { key:i, style:{ ...card, marginBottom:"0.75rem" } },
              React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"0.75rem" } },
                React.createElement("div", { style:{ flex:1, paddingRight:12 } },
                  React.createElement("span", { style:{ fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:4, background:TL, color:TD, marginRight:8 } }, `Q${i+1}`),
                  React.createElement("span", { style:{ fontSize:13, fontWeight:500 } }, item.question)
                ),
                React.createElement("div", { style:{ fontSize:22, fontWeight:600, whiteSpace:"nowrap", color: item.score>=80?T:item.score>=60?"#BA7517":"#A32D2D" } }, `${item.score||0}分`)
              ),
              React.createElement("div", { style:{ fontSize:12, color:"#868e96", background:"#f8f9fa", padding:"0.5rem 0.75rem", borderRadius:6, marginBottom:"0.75rem" } }, "你的回答：", item.summary),
              React.createElement("div", { style:{ marginBottom:"0.75rem" } },
                ["s","t","a","r"].map(k => React.createElement(StarBar, { key:k, k, score:item.star?.[k]||0 }))
              ),
              (item.issues||[]).length>0 && React.createElement("div", { style:{ fontSize:12, color:"#993C1D", marginBottom:"0.75rem" } }, "⚠️ ", (item.issues||[]).join("；")),
              React.createElement("button", {
                onClick: () => setExp(x=>({...x,[i]:!x[i]})),
                style:{ width:"100%", padding:"0.55rem 0.75rem", textAlign:"left", background: exp[i]?TL:"#f8f9fa", border:`0.5px solid ${exp[i]?T+"60":"#e9ecef"}`, borderRadius:6, fontSize:13, color: exp[i]?TD:"#868e96", fontWeight:500 }
              }, `✅ ${exp[i]?"收起":"展开"} 可直接使用的参考答案 ${exp[i]?"▲":"▼"}`),
              exp[i] && React.createElement("div", { style:{ marginTop:8, padding:"0.75rem 1rem", background:TL, borderRadius:8, fontSize:13, lineHeight:1.8, whiteSpace:"pre-wrap" } },
                item.reference,
                item.tip && React.createElement("div", { style:{ marginTop:8, fontSize:12, color:TD, borderTop:`0.5px solid ${T}30`, paddingTop:8 } }, "💡 ", item.tip)
              )
            )
          ),

          React.createElement("button", {
            onClick: restart,
            style:{ width:"100%", padding:"0.7rem", marginTop:4, background:"#fff", border:"0.5px solid #ced4da", borderRadius:8, fontSize:13, color:"#868e96" }
          }, "重新开始")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
